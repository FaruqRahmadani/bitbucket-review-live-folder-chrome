<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #2b2b2b;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #333333;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: #cfcfcf;
      font-size: 20px;
      cursor: pointer;
    }

    .field {
      margin-top: 18px;
    }

    .field label {
      display: block;
      font-size: 14px;
      color: #cfcfcf;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #4a4a4a;
      background: #1f1f1f;
      color: #f5f5f5;
      font-size: 15px;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 8px;
      accent-color: #4f9cff;
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #9b9b9b;
      margin-top: 6px;
    }

    .primary {
      width: 100%;
      margin-top: 24px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: #4f9cff;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #444444;
      text-align: center;
      color: #9b9b9b;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>Settings</h1>
      <button id="close" class="icon-btn" type="button" aria-label="Close">✕</button>
    </div>

    <div class="field">
      <label for="username">Bitbucket Username</label>
      <input id="username" type="text" placeholder="e.g. my-username or email" />
    </div>

    <div class="field">
      <label for="token">App Password</label>
      <input id="token" type="password" />
    </div>

    <div class="field">
      <label for="pollMinutes">Auto-refresh Interval: <span id="pollMinutesValue">3</span> minutes</label>
      <input id="pollMinutes" type="range" min="1" max="60" value="3" />
      <div class="range-labels">
        <span>1 min</span>
        <span>60 min</span>
      </div>
    </div>

    <button id="save" class="primary" type="button">Save Settings</button>

    <div class="footer">Bitbucket PR Watcher</div>
  </div>

  <script type="module" src="src/options.ts"></script>
</body>

</html>
